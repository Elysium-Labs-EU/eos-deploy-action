name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  lint:
    name: ShellCheck
    runs-on: codeberg-small
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: apt-get update && apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck scripts/*.sh
